<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="description" content="A lightweight alphabet quiz for practicing letters, words, and sounds.">
<meta name="theme-color" content="#ffb199">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Letter Quiz">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icon.svg">
<title>What Letter Is This?</title>
<style>
  :root {
    color-scheme: light;
    --ink: #243047;
    --muted: #4a5568;
    --panel: rgba(255, 255, 255, 0.72);
    --panel-strong: rgba(255, 255, 255, 0.9);
    --shadow: rgba(61, 48, 42, 0.18);
    --correct: #2f7d32;
    --correct-shadow: #1f5a22;
    --incorrect: #bd2f25;
    --incorrect-shadow: #822119;
    --secondary: #2868b7;
    --secondary-shadow: #174878;
    --reset: #5b5f6b;
    --reset-shadow: #3a3d45;
  }

  * {
    box-sizing: border-box;
  }

  html {
    min-height: 100%;
    background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 52%, #a1c4fd 100%);
  }

  body {
    min-height: 100dvh;
    margin: 0;
    padding: max(18px, env(safe-area-inset-top)) max(16px, env(safe-area-inset-right)) max(18px, env(safe-area-inset-bottom)) max(16px, env(safe-area-inset-left));
    display: grid;
    place-items: center;
    overflow-x: hidden;
    overflow-y: auto;
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }

  .app {
    width: min(100%, 980px);
    display: grid;
    gap: clamp(10px, 2vh, 18px);
    justify-items: center;
  }

  .topbar {
    width: min(100%, 760px);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
  }

  .pill {
    min-height: 38px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 7px 14px;
    border-radius: 999px;
    background: var(--panel);
    color: #333b4d;
    font-size: clamp(0.95rem, 3vw, 1.15rem);
    font-weight: 800;
    box-shadow: 0 8px 22px var(--shadow);
    backdrop-filter: blur(6px);
  }

  h1 {
    margin: 0;
    color: #3d4050;
    font-size: clamp(1.25rem, 5vw, 1.8rem);
    line-height: 1.1;
    text-align: center;
  }

  .card-button {
    width: min(100%, 820px);
    min-height: clamp(260px, 58dvh, 520px);
    margin: 0;
    padding: clamp(14px, 3vw, 32px);
    border: 0;
    border-radius: clamp(28px, 6vw, 46px);
    display: grid;
    place-items: center;
    background: rgba(255, 255, 255, 0.34);
    box-shadow: 0 16px 40px var(--shadow);
    cursor: pointer;
    backdrop-filter: blur(5px);
  }

  .card-button:focus-visible,
  button:focus-visible,
  input:focus-visible {
    outline: 4px solid rgba(36, 48, 71, 0.72);
    outline-offset: 5px;
  }

  .card {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: clamp(14px, 4vw, 44px);
    flex-wrap: wrap;
  }

  #letter {
    min-width: min(45vw, 240px);
    color: #1d3557;
    font-size: clamp(8rem, min(38vw, 42dvh), 20rem);
    font-weight: 950;
    line-height: 0.9;
    text-align: center;
    text-shadow: 4px 6px 0 rgba(0, 0, 0, 0.08);
  }

  #emoji {
    font-size: clamp(6rem, min(30vw, 34dvh), 15rem);
    line-height: 0.9;
    filter: drop-shadow(0 8px 0 rgba(0, 0, 0, 0.08));
  }

  #letter.pop,
  #emoji.pop {
    animation: pop 0.38s ease;
  }

  @keyframes pop {
    0% { transform: scale(0.58) rotate(-8deg); opacity: 0; }
    62% { transform: scale(1.12) rotate(3deg); opacity: 1; }
    100% { transform: scale(1) rotate(0deg); opacity: 1; }
  }

  @media (prefers-reduced-motion: reduce) {
    #letter.pop,
    #emoji.pop {
      animation: none;
    }
  }

  #word {
    margin-top: clamp(4px, 1.4vh, 10px);
    color: var(--ink);
    font-size: clamp(2rem, 8vw, 4.25rem);
    font-weight: 900;
    line-height: 1.05;
    text-align: center;
  }

  .message {
    min-height: 28px;
    margin-top: -4px;
    color: #334155;
    font-size: clamp(1rem, 3vw, 1.2rem);
    font-weight: 800;
    text-align: center;
  }

  .controls {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    justify-content: center;
  }

  button {
    min-height: 52px;
    padding: 14px 24px;
    border: none;
    border-radius: 999px;
    color: white;
    font-size: clamp(1rem, 4vw, 1.25rem);
    font-weight: 900;
    cursor: pointer;
    transition: transform 0.08s ease, box-shadow 0.08s ease;
    touch-action: manipulation;
  }

  button:active {
    transform: translateY(3px);
  }

  .correct {
    background: var(--correct);
    box-shadow: 0 4px 0 var(--correct-shadow);
  }

  .incorrect {
    background: var(--incorrect);
    box-shadow: 0 4px 0 var(--incorrect-shadow);
  }

  .secondary {
    background: var(--secondary);
    box-shadow: 0 4px 0 var(--secondary-shadow);
  }

  .reset {
    background: var(--reset);
    box-shadow: 0 4px 0 var(--reset-shadow);
  }

  .hint {
    max-width: 720px;
    color: var(--muted);
    font-size: clamp(0.88rem, 2.6vw, 1rem);
    text-align: center;
  }

  .options {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .options label {
    min-height: 38px;
    display: inline-flex;
    align-items: center;
    gap: 7px;
    padding: 7px 12px;
    border-radius: 999px;
    background: var(--panel);
    color: #374151;
    font-size: clamp(0.9rem, 3vw, 1rem);
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 8px 22px rgba(61, 48, 42, 0.1);
    backdrop-filter: blur(6px);
  }

  .options input[type="checkbox"] {
    width: 19px;
    height: 19px;
    margin: 0;
    cursor: pointer;
    accent-color: var(--secondary);
  }

  .celebration {
    position: fixed;
    inset: 0;
    z-index: 3;
    display: grid;
    place-items: center;
    padding: 24px;
    background: rgba(255, 255, 255, 0.54);
    backdrop-filter: blur(6px);
  }

  .celebration[hidden] {
    display: none;
  }

  .celebration-card {
    width: min(92vw, 520px);
    padding: 34px 28px;
    border-radius: 36px;
    background: var(--panel-strong);
    color: var(--ink);
    box-shadow: 0 20px 50px rgba(61, 48, 42, 0.2);
    text-align: center;
  }

  .celebration-card strong {
    display: block;
    font-size: clamp(2.2rem, 12vw, 4rem);
    line-height: 1;
  }

  .celebration-card span {
    display: block;
    margin-top: 12px;
    font-size: clamp(1.15rem, 4vw, 1.45rem);
    font-weight: 900;
  }

  @media (max-width: 560px) {
    body {
      align-items: start;
    }

    .topbar {
      justify-content: center;
      flex-wrap: wrap;
    }

    .card-button {
      min-height: clamp(280px, 50dvh, 430px);
    }

    .controls button {
      flex: 1 1 135px;
      padding-inline: 18px;
    }
  }
</style>
</head>
<body>
  <main class="app" aria-label="Kids letter quiz">
    <div class="topbar" aria-live="polite">
      <div id="score" class="pill">✓ 0 &nbsp; ✗ 0</div>
      <div id="progress" class="pill">1 / 26</div>
    </div>

    <h1>What letter is this?</h1>

    <button id="cardBtn" class="card-button" type="button" aria-label="Say this letter and word">
      <span class="card" aria-hidden="true">
        <span id="letter">A</span>
        <span id="emoji">🍎</span>
      </span>
      <span id="word">Apple</span>
    </button>

    <div id="message" class="message" aria-live="polite">Tap the card to hear it.</div>

    <div class="controls">
      <button id="correctBtn" class="correct" type="button">✓ Correct</button>
      <button id="incorrectBtn" class="incorrect" type="button">✗ Incorrect</button>
      <button id="sayBtn" class="secondary" type="button">Say It</button>
      <button id="resetBtn" class="reset" type="button">Reset</button>
    </div>

    <div class="hint">Keyboard: <b>&rarr;</b> correct, <b>&larr;</b> incorrect, <b>space</b> say it, <b>R</b> reset.</div>

    <div class="options" aria-label="Game options">
      <label><input type="checkbox" id="randomizeOpt"> Randomize</label>
      <label><input type="checkbox" id="reintroduceOpt" checked> Retry missed</label>
      <label><input type="checkbox" id="autoSpeakOpt"> Auto-speak</label>
      <label><input type="checkbox" id="lowercaseOpt"> Lowercase</label>
      <label><input type="checkbox" id="missedOnlyOpt"> Missed only</label>
    </div>
  </main>

  <div id="celebration" class="celebration" hidden aria-live="assertive">
    <div class="celebration-card">
      <strong>🎉</strong>
      <span>Alphabet complete!</span>
    </div>
  </div>

<script>
  const letterEl = document.getElementById('letter');
  const emojiEl = document.getElementById('emoji');
  const wordEl = document.getElementById('word');
  const cardBtn = document.getElementById('cardBtn');
  const correctBtn = document.getElementById('correctBtn');
  const incorrectBtn = document.getElementById('incorrectBtn');
  const sayBtn = document.getElementById('sayBtn');
  const resetBtn = document.getElementById('resetBtn');
  const scoreEl = document.getElementById('score');
  const progressEl = document.getElementById('progress');
  const messageEl = document.getElementById('message');
  const celebrationEl = document.getElementById('celebration');
  const randomizeOpt = document.getElementById('randomizeOpt');
  const reintroduceOpt = document.getElementById('reintroduceOpt');
  const autoSpeakOpt = document.getElementById('autoSpeakOpt');
  const lowercaseOpt = document.getElementById('lowercaseOpt');
  const missedOnlyOpt = document.getElementById('missedOnlyOpt');

  const LETTER_WORDS = {
    A: { emoji: '🍎', word: 'Apple' },
    B: { emoji: '⚽', word: 'Ball' },
    C: { emoji: '🐱', word: 'Cat' },
    D: { emoji: '🐶', word: 'Dog' },
    E: { emoji: '🐘', word: 'Elephant' },
    F: { emoji: '🐟', word: 'Fish' },
    G: { emoji: '🦒', word: 'Giraffe' },
    H: { emoji: '🎩', word: 'Hat' },
    I: { emoji: '🍦', word: 'Ice cream' },
    J: { emoji: '🧃', word: 'Juice' },
    K: { emoji: '🪁', word: 'Kite' },
    L: { emoji: '🦁', word: 'Lion' },
    M: { emoji: '🐵', word: 'Monkey' },
    N: { emoji: '🪺', word: 'Nest' },
    O: { emoji: '🍊', word: 'Orange' },
    P: { emoji: '🐧', word: 'Penguin' },
    Q: { emoji: '👸', word: 'Queen' },
    R: { emoji: '🌈', word: 'Rainbow' },
    S: { emoji: '☀️', word: 'Sun' },
    T: { emoji: '🐯', word: 'Tiger' },
    U: { emoji: '☂️', word: 'Umbrella' },
    V: { emoji: '🎻', word: 'Violin' },
    W: { emoji: '🐋', word: 'Whale' },
    X: { emoji: '🎼', word: 'Xylophone' },
    Y: { emoji: '🪀', word: 'Yo-yo' },
    Z: { emoji: '🦓', word: 'Zebra' },
  };

  const ALPHABET = Object.keys(LETTER_WORDS);
  const LETTER_COLORS = [
    '#1d3557', '#5f0f40', '#0b525b', '#3a0ca3', '#004b23', '#432818',
    '#023047', '#6d214f', '#3c096c', '#2d6a4f', '#003049', '#4a1942'
  ];
  const STORAGE_KEYS = {
    randomize: 'letterQuiz.randomize',
    reintroduce: 'letterQuiz.reintroduce',
    autoSpeak: 'letterQuiz.autoSpeak',
    lowercase: 'letterQuiz.lowercase',
    missedOnly: 'letterQuiz.missedOnly',
  };

  let bag = [];
  let retryQueue = [];
  let missedLetters = new Set();
  let completedLetters = new Set();
  let current = '';
  let currentIsRetry = false;
  let correctCount = 0;
  let incorrectCount = 0;
  let celebrationTimer = null;

  function shuffle(items) {
    const copy = [...items];
    for (let i = copy.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [copy[i], copy[j]] = [copy[j], copy[i]];
    }
    return copy;
  }

  function refillBag() {
    bag = randomizeOpt.checked ? shuffle(ALPHABET) : [...ALPHABET].reverse();
  }

  function updateScore() {
    scoreEl.textContent = `✓ ${correctCount}   ✗ ${incorrectCount}`;
    progressEl.textContent = `${Math.max(1, completedLetters.size + 1)} / ${ALPHABET.length}`;
  }

  function setMessage(text) {
    messageEl.textContent = text;
  }

  function displayLetter(letter) {
    return lowercaseOpt.checked ? letter.toLowerCase() : letter;
  }

  function renderCurrent(shouldSpeak = false) {
    if (!current) return;
    const entry = LETTER_WORDS[current];
    const colorIndex = (current.charCodeAt(0) - 65) % LETTER_COLORS.length;

    letterEl.textContent = displayLetter(current);
    emojiEl.textContent = entry.emoji;
    wordEl.textContent = entry.word;
    letterEl.style.color = LETTER_COLORS[colorIndex];
    cardBtn.setAttribute('aria-label', `Say ${displayLetter(current)}, ${entry.word}`);

    letterEl.classList.remove('pop');
    emojiEl.classList.remove('pop');
    void letterEl.offsetWidth;
    letterEl.classList.add('pop');
    emojiEl.classList.add('pop');

    setMessage(currentIsRetry ? 'Practice again.' : 'Tap the card to hear it.');
    updateScore();

    if (shouldSpeak && autoSpeakOpt.checked) {
      window.setTimeout(sayCurrent, 120);
    }
  }

  function showCelebration() {
    celebrationEl.hidden = false;
    window.clearTimeout(celebrationTimer);
    celebrationTimer = window.setTimeout(() => {
      celebrationEl.hidden = true;
    }, 1800);
  }

  function markRoundProgress() {
    if (!currentIsRetry) {
      completedLetters.add(current);
      if (completedLetters.size === ALPHABET.length) {
        showCelebration();
        completedLetters = new Set();
      }
    }
  }

  function decayRetryQueue() {
    retryQueue = retryQueue.map((item) => ({ ...item, delay: Math.max(0, item.delay - 1) }));
  }

  function takeRetryLetter() {
    const index = retryQueue.findIndex((item) => item.delay === 0 && item.letter !== current);
    if (index === -1) return null;
    const [item] = retryQueue.splice(index, 1);
    return item.letter;
  }

  function nextLetter(shouldSpeak = false) {
    decayRetryQueue();

    if (missedOnlyOpt.checked) {
      const choices = [...missedLetters].filter((letter) => letter !== current);
      if (choices.length === 0 && missedLetters.size > 0) choices.push(...missedLetters);
      if (choices.length === 0) {
        setMessage('No missed letters yet. Turn off Missed only to keep going.');
        missedOnlyOpt.checked = false;
        saveOption('missedOnly', false);
      } else {
        current = randomizeOpt.checked ? choices[Math.floor(Math.random() * choices.length)] : choices.sort()[0];
        currentIsRetry = true;
        renderCurrent(shouldSpeak);
        return;
      }
    }

    const readyRetry = retryQueue.some((item) => item.delay === 0 && item.letter !== current);
    const useRetry = reintroduceOpt.checked && readyRetry && (bag.length === 0 || Math.random() < 0.35);

    if (useRetry) {
      current = takeRetryLetter();
      currentIsRetry = true;
      renderCurrent(shouldSpeak);
      return;
    }

    if (bag.length === 0) refillBag();

    if (randomizeOpt.checked && bag[bag.length - 1] === current && bag.length > 1) {
      [bag[0], bag[bag.length - 1]] = [bag[bag.length - 1], bag[0]];
    }

    current = bag.pop();
    currentIsRetry = false;
    renderCurrent(shouldSpeak);
  }

  function markCorrect() {
    if (!current) return;
    correctCount++;
    missedLetters.delete(current);
    markRoundProgress();
    nextLetter(true);
  }

  function markIncorrect() {
    if (!current) return;
    incorrectCount++;
    missedLetters.add(current);
    if (reintroduceOpt.checked) {
      retryQueue.push({ letter: current, delay: 3 + Math.floor(Math.random() * 2) });
    }
    markRoundProgress();
    nextLetter(true);
  }

  function sayCurrent() {
    if (!current || !('speechSynthesis' in window)) return;
    const entry = LETTER_WORDS[current];
    const letterLabel = lowercaseOpt.checked ? `lowercase ${current.toLowerCase()}` : current;
    const u = new SpeechSynthesisUtterance(`${letterLabel}. ${current} is for ${entry.word}.`);
    u.rate = 0.82;
    u.pitch = 1.08;
    speechSynthesis.cancel();
    speechSynthesis.speak(u);
  }

  function resetGame() {
    correctCount = 0;
    incorrectCount = 0;
    retryQueue = [];
    missedLetters = new Set();
    completedLetters = new Set();
    current = '';
    currentIsRetry = false;
    celebrationEl.hidden = true;
    refillBag();
    nextLetter(false);
    setMessage('Fresh round. Tap the card to hear it.');
  }

  function loadOptions() {
    try {
      for (const [name, key] of Object.entries(STORAGE_KEYS)) {
        const saved = localStorage.getItem(key);
        const input = document.getElementById(`${name}Opt`);
        if (saved !== null && input) input.checked = saved === 'true';
      }
    } catch (e) {}
  }

  function saveOption(name, value) {
    try {
      localStorage.setItem(STORAGE_KEYS[name], String(value));
    } catch (e) {}
  }

  correctBtn.addEventListener('click', markCorrect);
  incorrectBtn.addEventListener('click', markIncorrect);
  sayBtn.addEventListener('click', sayCurrent);
  cardBtn.addEventListener('click', sayCurrent);
  resetBtn.addEventListener('click', resetGame);
  celebrationEl.addEventListener('click', () => {
    celebrationEl.hidden = true;
  });

  randomizeOpt.addEventListener('change', () => {
    saveOption('randomize', randomizeOpt.checked);
    refillBag();
  });

  reintroduceOpt.addEventListener('change', () => {
    saveOption('reintroduce', reintroduceOpt.checked);
    if (!reintroduceOpt.checked) retryQueue = [];
  });

  autoSpeakOpt.addEventListener('change', () => {
    saveOption('autoSpeak', autoSpeakOpt.checked);
    if (autoSpeakOpt.checked) sayCurrent();
  });

  lowercaseOpt.addEventListener('change', () => {
    saveOption('lowercase', lowercaseOpt.checked);
    renderCurrent(false);
  });

  missedOnlyOpt.addEventListener('change', () => {
    saveOption('missedOnly', missedOnlyOpt.checked);
    nextLetter(false);
  });

  document.addEventListener('keydown', (e) => {
    if (e.code === 'ArrowRight') {
      e.preventDefault();
      markCorrect();
    } else if (e.code === 'ArrowLeft') {
      e.preventDefault();
      markIncorrect();
    } else if (e.code === 'ArrowUp' || e.code === 'Space') {
      e.preventDefault();
      sayCurrent();
    } else if (e.code === 'KeyR') {
      e.preventDefault();
      resetGame();
    } else if (e.code === 'Escape') {
      celebrationEl.hidden = true;
    }
  });

  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js').catch(() => {});
    });
  }

  loadOptions();
  refillBag();
  nextLetter(false);
  updateScore();
</script>
</body>
</html>
